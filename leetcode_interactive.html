<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode з нуля — Kotlin</title>
<style>
:root {
  --bg: #0d1117;
  --sidebar-bg: #161b22;
  --card: #1c2128;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --blue: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #e3b341;
  --purple: #bc8cff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

.sidebar {
  width: 268px;
  flex-shrink: 0;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.sidebar-header {
  padding: 22px 18px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header h1 { font-size: 17px; font-weight: 700; color: var(--blue); }
.sidebar-header p  { font-size: 12px; color: var(--muted); margin-top: 3px; }

.progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 10px; }
.progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width .4s; }

.lesson-list { padding: 10px; }

.lesson-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: 8px; cursor: pointer;
  margin-bottom: 2px; transition: background .15s; user-select: none;
}
.lesson-item:hover:not(.locked) { background: rgba(255,255,255,.05); }
.lesson-item.active  { background: rgba(88,166,255,.1); }
.lesson-item.active .l-name { color: var(--blue); }
.lesson-item.locked  { opacity: .38; cursor: not-allowed; }

.l-icon {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
  background: var(--border); color: var(--muted);
}
.l-icon.done   { background: var(--green); color: #fff; font-size: 14px; }
.l-icon.active { background: var(--blue);  color: #fff; }

.l-name { font-size: 13px; line-height: 1.3; }
.l-tag  { font-size: 10px; color: var(--muted); margin-top: 1px; }

.main { flex: 1; overflow-y: auto; padding: 40px 44px 80px; }

.lesson-title    { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
.lesson-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 30px; }

.section      { margin-bottom: 24px; }
.section h3   { font-size: 15px; font-weight: 700; color: var(--blue); margin-bottom: 8px; }
.section p,
.section li   { color: #b8c2cc; line-height: 1.75; font-size: 15px; }
.section ul   { padding-left: 20px; margin-top: 6px; }
.section li   { margin-bottom: 4px; }

.box {
  border-radius: 10px; padding: 16px 20px; margin: 14px 0;
}
.box-purple { background: rgba(188,140,255,.07); border: 1px solid rgba(188,140,255,.2); }
.box-blue   { background: rgba(88,166,255,.07);  border: 1px solid rgba(88,166,255,.2); }
.box-yellow { background: rgba(227,179,65,.07);  border: 1px solid rgba(227,179,65,.2); }
.box-green  { background: rgba(63,185,80,.07);   border: 1px solid rgba(63,185,80,.2); }

.box .box-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 7px; }
.box-purple .box-title { color: var(--purple); }
.box-blue   .box-title { color: var(--blue); }
.box-yellow .box-title { color: var(--yellow); }
.box-green  .box-title { color: var(--green); }
.box p, .box li { color: #c8cdd4; font-size: 14px; line-height: 1.65; }
.box ul { padding-left: 18px; margin-top: 4px; }
.box li { margin-bottom: 3px; }

.arr-wrap { display: flex; flex-direction: column; gap: 6px; margin: 16px 0; }
.arr-row  { display: flex; gap: 4px; }
.arr-cell { text-align: center; }
.arr-val  {
  width: 54px; height: 54px; border: 2px solid var(--blue); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; background: rgba(88,166,255,.06);
}
.arr-val.highlight { background: rgba(88,166,255,.25); border-color: #79bcff; }
.arr-idx { font-size: 11px; color: var(--muted); font-family: monospace; margin-top: 5px; }

.step-table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
.step-table th { background: rgba(255,255,255,.05); color: var(--muted); padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 600; }
.step-table td { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,.04); color: #b8c2cc; font-family: monospace; }
.step-table tr:last-child td { border-bottom: none; }
.step-table tr.hl td { background: rgba(88,166,255,.07); color: var(--blue); }

code {
  background: rgba(255,255,255,.08); border-radius: 4px;
  padding: 1px 6px; font-family: 'Courier New', monospace; font-size: 13px; color: #e0a8ff;
}

.codeblock {
  background: #161b22; border: 1px solid var(--border); border-radius: 10px;
  padding: 16px 20px; font-family: 'Courier New', monospace; font-size: 14px;
  line-height: 1.7; margin: 12px 0; overflow-x: auto; white-space: pre;
  color: #e6edf3;
}
.kw  { color: #ff7b72; }
.fn  { color: #d2a8ff; }
.cm  { color: #6e7681; font-style: italic; }
.str { color: #a5d6ff; }
.nm  { color: #79c0ff; }
.tp  { color: #ffa657; }

.task-header {
  background: rgba(227,179,65,.08); border: 1px solid rgba(227,179,65,.22);
  border-radius: 10px; padding: 14px 18px; margin: 28px 0 14px;
}
.task-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--yellow); margin-bottom: 6px; }
.task-header p { color: #d4ba8a; font-size: 14px; line-height: 1.6; }

.editor-wrap { background: #0d1117; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.editor-bar  { background: #161b22; border-bottom: 1px solid var(--border); padding: 8px 14px; display: flex; align-items: center; gap: 6px; }
.dot         { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
.editor-lang { margin-left: auto; font-size: 11px; color: #7c6fe0; font-weight: 700; }

textarea {
  width: 100%; background: transparent; border: none; outline: none;
  color: #e6edf3; font-family: 'Courier New', monospace; font-size: 14px;
  line-height: 1.7; padding: 16px 20px; resize: vertical; min-height: 150px; tab-size: 4;
}

.actions { display: flex; gap: 10px; margin-top: 12px; align-items: center; }

.btn-run {
  background: var(--green); color: #000; border: none; padding: 10px 26px;
  border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .15s;
  min-width: 160px;
}
.btn-run:hover:not(:disabled) { opacity: .85; }
.btn-run:disabled { opacity: .5; cursor: not-allowed; }

.btn-hint {
  background: transparent; color: var(--yellow);
  border: 1px solid rgba(227,179,65,.3); padding: 10px 18px;
  border-radius: 8px; font-size: 14px; cursor: pointer; transition: background .15s;
}
.btn-hint:hover { background: rgba(227,179,65,.08); }

.btn-reset {
  background: transparent; color: var(--muted); border: 1px solid var(--border);
  padding: 10px 16px; border-radius: 8px; font-size: 14px; cursor: pointer;
}

.hint-area {
  background: rgba(227,179,65,.06); border: 1px solid rgba(227,179,65,.2);
  border-radius: 10px; padding: 14px 18px; margin-top: 12px; display: none;
}
.hint-area p { color: #c8a860; font-size: 14px; line-height: 1.65; }
.hint-area code { color: #f0c070; }

.results { margin-top: 14px; display: none; }

.r-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 14px; border-radius: 8px; margin-bottom: 6px;
  background: var(--card); font-size: 13px;
}
.r-item.pass  { border-left: 3px solid var(--green); }
.r-item.fail  { border-left: 3px solid var(--red); }
.r-item.error { border-left: 3px solid var(--yellow); }
.r-item.info  { border-left: 3px solid var(--blue); }

.r-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
.r-body .r-desc   { color: var(--text); margin-bottom: 2px; }
.r-body .r-detail { font-size: 12px; color: var(--muted); font-family: monospace; white-space: pre-wrap; }

.success-banner {
  display: none; align-items: center; gap: 14px;
  background: rgba(63,185,80,.1); border: 1px solid rgba(63,185,80,.3);
  border-radius: 10px; padding: 16px 20px; margin-top: 14px;
}
.success-banner.show { display: flex; }
.sb-icon { font-size: 30px; }
.sb-text h4 { color: var(--green); font-size: 15px; margin-bottom: 3px; }
.sb-text p  { color: #7dbf8a; font-size: 13px; }

.btn-next {
  margin-left: auto; flex-shrink: 0;
  background: var(--blue); color: #000; border: none; padding: 10px 22px;
  border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .15s;
}
.btn-next:hover { opacity: .85; }

.no-editor-next { margin-top: 32px; display: flex; justify-content: flex-end; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1>LeetCode з нуля</h1>
    <p id="prog-text">0 з 7 уроків пройдено</p>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="lesson-list" id="lesson-list"></div>
</aside>

<div class="main" id="main"></div>

<script>
// ─── LESSONS ────────────────────────────────────────────────────────────────

const LESSONS = [

// ── 1 ────────────────────────────────────────────────────────────────────────
{
  id: 1, title: "Що таке задача", tag: "Теорія", hasEditor: false,
  content: `
<h1 class="lesson-title">Що таке задача на LeetCode?</h1>
<p class="lesson-subtitle">Перш ніж писати код — зрозуміємо як взагалі думати</p>

<div class="section">
  <h3>Функція = чорна скринька</h3>
  <p>Уяви м'ясорубку. Ти кидаєш в неї м'ясо — вона повертає фарш. Що всередині — не важливо, важливо що ти кинув і що отримав.</p>
  <div class="box box-purple">
    <div class="box-title">Аналогія</div>
    <p><strong>М'ясо</strong> = вхідні дані (input)<br>
    <strong>М'ясорубка</strong> = функція (твій код)<br>
    <strong>Фарш</strong> = результат (return)</p>
  </div>
  <p>В Kotlin це виглядає так:</p>
  <div class="codeblock"><span class="kw">fun</span> <span class="fn">назваФункції</span>(вхідніДані: <span class="tp">Тип</span>): <span class="tp">Результат</span> {
    <span class="cm">// тут твій код — те що робить м'ясорубка</span>
    <span class="kw">return</span> результат
}</div>
</div>

<div class="section">
  <h3>Як виглядає типова задача</h3>
  <p>На LeetCode тобі дають умову і заготовку функції. Твоя задача — заповнити тіло.</p>
  <div class="box box-blue">
    <div class="box-title">Приклад умови</div>
    <p>«Дано масив чисел <code>nums</code>. Знайди два числа, сума яких рівна <code>target</code>. Поверни їхні індекси.»</p>
  </div>
  <div class="codeblock"><span class="cm">// Заготовка яку дає LeetCode:</span>
<span class="kw">fun</span> <span class="fn">twoSum</span>(nums: <span class="tp">IntArray</span>, target: <span class="tp">Int</span>): <span class="tp">IntArray</span> {
    <span class="cm">// ← тут треба написати твій код</span>
}</div>
  <p>До кінця курсу напишеш цю функцію сам.</p>
</div>

<div class="section">
  <h3>Що нам треба знати</h3>
  <div class="box box-green">
    <div class="box-title">Потрібні знання</div>
    <ul>
      <li><strong>Структури даних</strong> — де і як зберігати числа (масив, словник)</li>
      <li><strong>Паттерни</strong> — типові способи вирішення задач</li>
    </ul>
  </div>
  <p>Вчимося по одному кроку. Починаємо з найпростішого — масиву.</p>
</div>
`},

// ── 2 ────────────────────────────────────────────────────────────────────────
{
  id: 2, title: "Масив та індекс", tag: "Структура даних", hasEditor: true,
  functionName: "getElement", returnType: "int",
  starterCode: `fun getElement(arr: IntArray, index: Int): Int {
    // Напиши тут один рядок

}`,
  hint: `Щоб отримати елемент масиву за індексом — просто напиши: <code>return arr[index]</code><br><br>Масив — це як пронумеровані шухляди. <code>arr[index]</code> відкриває потрібну шухляду і дає те що всередині.`,
  taskDesc: `Напиши функцію <code>getElement</code>, яка приймає масив <code>arr</code> і число <code>index</code>, та повертає елемент масиву за цим індексом.`,
  tests: [
    { inputs: [[1,5,3,8,2], 0], expected: 1,  desc: "перший елемент (індекс 0)" },
    { inputs: [[1,5,3,8,2], 2], expected: 3,  desc: "третій елемент (індекс 2)" },
    { inputs: [[10,20,30],   1], expected: 20, desc: "середній елемент" },
    { inputs: [[42],         0], expected: 42, desc: "масив з одного елемента" },
  ],
  content: `
<h1 class="lesson-title">Масив та індекс</h1>
<p class="lesson-subtitle">Найважливіша структура даних — вчимося читати з неї</p>

<div class="section">
  <h3>Що таке масив</h3>
  <p>Масив — це список значень що зберігаються в ряд. Уяви пронумеровані шухляди:</p>
  <div class="arr-wrap">
    <div class="arr-row">
      <div class="arr-cell"><div class="arr-val">1</div><div class="arr-idx">arr[0]</div></div>
      <div class="arr-cell"><div class="arr-val">5</div><div class="arr-idx">arr[1]</div></div>
      <div class="arr-cell"><div class="arr-val">3</div><div class="arr-idx">arr[2]</div></div>
      <div class="arr-cell"><div class="arr-val">8</div><div class="arr-idx">arr[3]</div></div>
      <div class="arr-cell"><div class="arr-val">2</div><div class="arr-idx">arr[4]</div></div>
    </div>
  </div>
  <div class="box box-yellow">
    <div class="box-title">Найважливіше правило</div>
    <p>Нумерація <strong>завжди починається з 0</strong>, а не з 1.<br>
    Перший елемент → <code>arr[0]</code><br>
    Другий елемент → <code>arr[1]</code><br>
    П'ятий елемент → <code>arr[4]</code></p>
  </div>
</div>

<div class="section">
  <h3>Як читати з масиву в Kotlin</h3>
  <div class="codeblock"><span class="kw">val</span> arr = intArrayOf(<span class="nm">1</span>, <span class="nm">5</span>, <span class="nm">3</span>, <span class="nm">8</span>, <span class="nm">2</span>)

arr[<span class="nm">0</span>]    <span class="cm">// → 1  (перший елемент)</span>
arr[<span class="nm">2</span>]    <span class="cm">// → 3  (третій елемент)</span>
arr[<span class="nm">4</span>]    <span class="cm">// → 2  (п'ятий елемент)</span>

arr.size   <span class="cm">// → 5  (кількість елементів)</span></div>

  <div class="box box-purple">
    <div class="box-title">Kotlin особливості</div>
    <ul>
      <li><code>val</code> = константа (не змінюється після присвоєння)</li>
      <li><code>intArrayOf(...)</code> = створити масив цілих чисел</li>
      <li><code>arr.size</code> = кількість елементів (в JS було <code>arr.length</code>)</li>
    </ul>
  </div>
</div>

<div class="section">
  <h3>Як виглядає функція</h3>
  <div class="codeblock"><span class="kw">fun</span> <span class="fn">getElement</span>(arr: <span class="tp">IntArray</span>, index: <span class="tp">Int</span>): <span class="tp">Int</span> {
    <span class="kw">return</span> arr[index]
}</div>
  <div class="box box-blue">
    <div class="box-title">Що означають типи</div>
    <ul>
      <li><code>arr: IntArray</code> — параметр arr це масив цілих чисел</li>
      <li><code>index: Int</code> — параметр index це ціле число</li>
      <li><code>): Int</code> — функція повертає ціле число</li>
    </ul>
  </div>
  <p>Виклик: <code>getElement(intArrayOf(1, 5, 3, 8, 2), 2)</code> → поверне <code>3</code>.</p>
</div>
`},

// ── 3 ────────────────────────────────────────────────────────────────────────
{
  id: 3, title: "Цикл — перебір масиву", tag: "Основи", hasEditor: true,
  functionName: "arraySum", returnType: "int",
  starterCode: `fun arraySum(arr: IntArray): Int {
    var total = 0

    for (i in 0 until arr.size) {
        // додай arr[i] до total

    }

    return total
}`,
  hint: `Всередині циклу напиши: <code>total += arr[i]</code><br><br>Це те саме що: <code>total = total + arr[i]</code><br><br><code>arr[i]</code> — поточний елемент масиву на кроці <code>i</code>.`,
  taskDesc: `Напиши функцію <code>arraySum</code>, яка повертає суму всіх елементів масиву. Заготовка циклу вже є — залишилося один рядок всередині.`,
  tests: [
    { inputs: [[1,2,3]],    expected: 6,  desc: "[1, 2, 3] → сума 6" },
    { inputs: [[10,20,30]], expected: 60, desc: "[10, 20, 30] → сума 60" },
    { inputs: [[5]],        expected: 5,  desc: "[5] → сума 5" },
    { inputs: [[0,0,0,1]],  expected: 1,  desc: "[0, 0, 0, 1] → сума 1" },
  ],
  content: `
<h1 class="lesson-title">Цикл — перебір масиву</h1>
<p class="lesson-subtitle">Як пройти по кожному елементу масиву</p>

<div class="section">
  <h3>Що таке цикл</h3>
  <p>Цикл — це команда «зроби це для кожного елемента по черзі». Як рахуєш гроші в гаманці — береш кожну купюру і додаєш до суми.</p>
  <div class="codeblock"><span class="kw">for</span> (i <span class="kw">in</span> <span class="nm">0</span> until arr.size) {
    <span class="cm">// цей код виконується для кожного i</span>
    <span class="cm">// i = 0, потім 1, потім 2, ... поки не дійшли до кінця</span>
    println(arr[i]) <span class="cm">// поточний елемент</span>
}</div>
  <div class="box box-blue">
    <div class="box-title">Частини циклу</div>
    <ul>
      <li><code>i in 0 until arr.size</code> — i іде від 0 до розміру масиву (не включно)</li>
      <li><code>arr[i]</code> — поточний елемент</li>
      <li>Kotlin сам збільшує i на 1 після кожного кроку</li>
    </ul>
  </div>
</div>

<div class="section">
  <h3>Крок за кроком — масив [1, 5, 3]</h3>
  <table class="step-table">
    <tr><th>Крок</th><th>i</th><th>arr[i]</th><th>total</th></tr>
    <tr><td>Початок</td><td>—</td><td>—</td><td>0</td></tr>
    <tr class="hl"><td>1</td><td>0</td><td>1</td><td>0 + 1 = 1</td></tr>
    <tr><td>2</td><td>1</td><td>5</td><td>1 + 5 = 6</td></tr>
    <tr><td>3</td><td>2</td><td>3</td><td>6 + 3 = 9</td></tr>
    <tr><td>Кінець</td><td>—</td><td>—</td><td>9 ✓</td></tr>
  </table>
  <div class="codeblock"><span class="kw">fun</span> <span class="fn">arraySum</span>(arr: <span class="tp">IntArray</span>): <span class="tp">Int</span> {
    <span class="kw">var</span> total = <span class="nm">0</span>
    <span class="kw">for</span> (i <span class="kw">in</span> <span class="nm">0</span> until arr.size) {
        total += arr[i] <span class="cm">// те саме що: total = total + arr[i]</span>
    }
    <span class="kw">return</span> total
}</div>
  <div class="box box-purple">

let progress  = loadProgress();
let currentId = 1;

  document.getElementById('prog-fill').style.width = `${Math.round(done / LESSONS.length * 100)}%`;
  document.getElementById('lesson-list').innerHTML = LESSONS.map(l => {
    const isDone   = !!progress[l.id];
    const isActive = l.id === currentId;

}

      <div class="results" id="results"></div>
      <div class="success-banner" id="success-banner">
        <div class="sb-icon">🎉</div>
        <div class="sb-text"><h4>Всі тести пройдено!</h4><p>Молодець — переходь до наступного уроку</p></div>
        ${id < LESSONS.length ? `<button class="btn-next" onclick="nextLesson()">Далі →</button>` : ''}
      </div>`;
  } else {
    editorHTML = `<div class="no-editor-next"><button class="btn-next" onclick="nextLesson()">Далі →</button></div>`;
  }

  document.getElementById('main').innerHTML = `<div>${l.content}${editorHTML}</div>`;
}

// ─── NAVIGATION ─────────────────────────────────────────────────────────────

function goToLesson(id) {
  if (id > 1 && !progress[id - 1] && !progress[id]) return;
  currentId = id;
  document.getElementById('main').scrollTop = 0;
  renderSidebar();
  renderLesson(id);
}

function nextLesson() {
  if (!progress[currentId]) { progress[currentId] = true; saveProgress(progress); }
  if (currentId + 1 <= LESSONS.length) goToLesson(currentId + 1);
}

// ─── KOTLIN TEST RUNNER ─────────────────────────────────────────────────────

function toKotlinInput(v) {
  if (Array.isArray(v)) return `intArrayOf(${v.join(', ')})`;
  return String(v);
}

function toExpectedStr(expected, returnType) {
  if (returnType === 'int')      return String(expected);
  if (returnType === 'intarray') return `[${expected.join(', ')}]`;
  if (returnType === 'map') {
    const pairs = Object.entries(expected)
      .sort((a, b) => Number(a[0]) - Number(b[0]))
      .map(([k, v]) => `${k}=${v}`).join(', ');
    return `{${pairs}}`;
  }
}

function buildKotlinCode(lesson, userCode) {
  const prints = lesson.tests.map(test => {
    const args = test.inputs.map(toKotlinInput).join(', ');
    const call = `${lesson.functionName}(${args})`;
    let printExpr;
    if (lesson.returnType === 'int') {
      printExpr = call;
    } else if (lesson.returnType === 'intarray') {
      printExpr = `run { val _r = ${call}; "[" + _r.joinToString(", ") + "]" }`;
    } else if (lesson.returnType === 'map') {
      printExpr = `run { val _r = ${call}; "{" + _r.entries.sortedBy { it.key }.joinToString(", ") { "\${it.key}=\${it.value}" } + "}" }`;
    }
    return `    try { println(${printExpr}) } catch (e: Exception) { println("ERR:\${e.message}") }`;
  }).join('\n');

  return `${userCode}\n\nfun main() {\n${prints}\n}`;
}

async function runTests() {
  const l = LESSONS.find(x => x.id === currentId);
  if (!l || !l.hasEditor) return;

  const code      = document.getElementById('code-editor').value;
  const resultsEl = document.getElementById('results');
  const bannerEl  = document.getElementById('success-banner');
  const runBtn    = document.getElementById('run-btn');

  resultsEl.style.display = 'block';
  resultsEl.innerHTML = `<div class="r-item info"><div class="r-icon">⏳</div><div class="r-body"><div class="r-desc">Компілюємо і запускаємо Kotlin...</div><div class="r-detail">Це займає 2–4 секунди</div></div></div>`;
  bannerEl.classList.remove('show');
  runBtn.disabled = true;
  runBtn.textContent = '⏳ Запуск...';

  const kotlinCode = buildKotlinCode(l, code);

  let apiResult;
  try {
    const resp = await fetch('https://api.kotlinlang.org/api/1.7.20/compiler/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ args: '', files: [{ name: 'main.kt', text: kotlinCode }], confType: 'java' })
    });
    if (!resp.ok) throw new Error(`Сервер відповів ${resp.status}`);
    apiResult = await resp.json();
  } catch (e) {
    resultsEl.innerHTML = `<div class="r-item error"><div class="r-icon">🌐</div><div class="r-body"><div class="r-desc">Помилка з'єднання з Kotlin Playground</div><div class="r-detail">Перевір інтернет-з'єднання.\n${e.message}</div></div></div>`;
    runBtn.disabled = false; runBtn.textContent = '▶ Запустити тести';
    return;
  }

  runBtn.disabled = false; runBtn.textContent = '▶ Запустити тести';

  // Compile errors
  const errors = (apiResult.errors?.['main.kt'] || []).filter(e => e.severity === 'ERROR');
  if (errors.length > 0) {
    const msg = errors.map(e => `${e.message}`).join('\n');
    resultsEl.innerHTML = `<div class="r-item error"><div class="r-icon">⚠️</div><div class="r-body"><div class="r-desc">Помилка компіляції</div><div class="r-detail">${msg}</div></div></div>`;
    return;
  }

  // Runtime exception
  if (apiResult.exception) {
    resultsEl.innerHTML = `<div class="r-item error"><div class="r-icon">💥</div><div class="r-body"><div class="r-desc">Помилка виконання</div><div class="r-detail">${apiResult.exception.message || apiResult.exception.fullName}</div></div></div>`;
    return;
  }

  const rawText = (apiResult.text || '').replace(/<outStream>|<\/outStream>|<errStream>|<\/errStream>/g, '');
  const outputLines = rawText.trim().split('\n');
  let allPassed = true;

  const items = l.tests.map((test, idx) => {
    const actual   = (outputLines[idx] || '').trim();
    const expected = toExpectedStr(test.expected, l.returnType);
    const isErr    = actual.startsWith('ERR:');
    const passed   = !isErr && actual === expected;
    if (!passed) allPassed = false;
    return `<div class="r-item ${isErr ? 'error' : passed ? 'pass' : 'fail'}">
      <div class="r-icon">${isErr ? '⚠️' : passed ? '✅' : '❌'}</div>
      <div class="r-body">
        <div class="r-desc">${test.desc}</div>
        <div class="r-detail">${isErr ? actual : `Очікував: ${expected}   |   Отримав: ${actual}`}</div>
      </div>
    </div>`;
  });

  resultsEl.innerHTML = items.join('');

  if (allPassed) {
    bannerEl.classList.add('show');
    if (!progress[currentId]) { progress[currentId] = true; saveProgress(progress); renderSidebar(); }
  }
}

function toggleHint() {
  const h = document.getElementById('hint-area');
  h.style.display = h.style.display === 'block' ? 'none' : 'block';
}

function resetCode() {
  const l = LESSONS.find(x => x.id === currentId);
  if (l) document.getElementById('code-editor').value = l.starterCode;
}

// Tab key in textarea
document.addEventListener('keydown', e => {
  if (e.key === 'Tab' && document.activeElement.tagName === 'TEXTAREA') {
    e.preventDefault();
    const ta = document.activeElement, s = ta.selectionStart;
    ta.value = ta.value.substring(0, s) + '    ' + ta.value.substring(ta.selectionEnd);
    ta.selectionStart = ta.selectionEnd = s + 4;
  }
});

// ─── INIT ───────────────────────────────────────────────────────────────────
renderSidebar();
renderLesson(1);
</script>
</body>
</html>
